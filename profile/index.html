<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <title>Alex Holden - Welcome To My Profile!</title>
  </head>
  <body class="bg-neutral-200 min-h-screen font1 overflow-x-hidden">
    <section class="min-h-screen w-full flex flex-col md:flex-row gap-8 px-4 py-10">
      <!--Left hand card-->
      <div class="w-full max-w-md md:w-1/3 mx-auto">
        <div class="md:sticky md:top-10 bg-blue-500 rounded-xl shadow-lg flex flex-col items-center p-8">
          <div class="avatar avatar-placeholder">
            <div class="bg-neutral text-neutral-content w-24 rounded-full">
              <span class="text-3xl">A</span>
            </div>
          </div>
          <div class="divider w-full"></div>
          <p class="text-white text-xl text-center">alex holden</p>
          <div class="flex gap-6 mt-4">
            <a href="https://github.com/adholden95">
              <i class="bi bi-github text-white text-4xl hover:text-sky-950 transition"></i>
            </a>
            <a href="https://www.linkedin.com/in/alex-holden-400280279">
              <i class="bi bi-linkedin text-white text-4xl hover:text-sky-950 transition"></i>
            </a>
          </div>
          <div class="flex items-center gap-4 mt-6">
            <a href="#" class="text-white hover:underline text-center">Download CV</a>
            <div class="divider divider-horizontal"></div>
            <a href="contact.html" class="text-white hover:underline text-center">Contact Me</a>
          </div>
        </div>
      </div>
      <!--Right Hand Card-->
      <div class="w-full max-w-2xl md:w-2/3 bg-white rounded-xl shadow-lg p-8 mx-auto">
        <h2 class="text-2xl font-semibold">About Me</h2>
        <div class="divider divider-info"></div>
        <p class="mt-2">
          Hi, I'm Alex and I'm an aspiring developer. Welcome to my profile page!
        </p>
        <ul class="mt-8 space-y-4">
          <li class="flex justify-between items-center">
            <span class="bg-blue-500 text-white rounded px-3 py-1">Age:</span>
            <span>30</span>
          </li>
          <li class="flex justify-between items-center">
            <span class="bg-blue-500 text-white rounded px-3 py-1">Location:</span>
            <span>Leeds, UK</span>
          </li>
          <li class="flex justify-between items-center">
            <span class="bg-blue-500 text-white rounded px-3 py-1">Education:</span>
            <span>BSc</span>
          </li>
          <li class="flex justify-between items-center">
            <span class="bg-blue-500 text-white rounded px-3 py-1">Email Address:</span>
            <span>adholden@live.co.uk</span>
          </li>
        </ul>
        <div class="divider divider-info"></div>
        <h2 class="text-2xl font-semibold">My Skills</h2>
        <div class="divider divider-info"></div>
        <!--Skills-->
        <div class="grid grid-cols-2 gap-6 px-6 md:grid-cols-3 py-2">
          <div class="card bg-base shadow-sm rounded-full">
            <figure class="max-w-1/2 mx-auto pt-10">
              <img src="HTMLicon.png" alt="HTML Icon" />
            </figure>
            <div class="card-body items-center">
              <h2 class="card-title text-center">HTML</h2>
            </div>
          </div>
          <div class="card bg-base shadow-sm rounded-full">
            <figure class="max-w-1/2 mx-auto pt-10">
              <img src="CSSicon.png" alt="CSS Icon" />
            </figure>
            <div class="card-body items-center">
              <h2 class="card-title text-center">CSS</h2>
            </div>
          </div>
          <div class="card bg-base shadow-sm rounded-full">
            <figure class="max-w-1/2 mx-auto pt-10">
              <img src="JSicon.png" alt="JavaScript Icon" />
            </figure>
            <div class="card-body items-center">
              <h2 class="card-title text-center">JavaScript</h2>
            </div>
          </div>
          <div class="card bg-base shadow-sm rounded-full">
            <figure class="max-w-1/2 mx-auto pt-10">
              <img src="Bootstrapicon.png" alt="Bootstrap Icon" />
            </figure>
            <div class="card-body items-center">
              <h2 class="card-title text-center">Bootstrap</h2>
            </div>
          </div>
          <div class="card bg-base shadow-sm rounded-full">
            <figure class="max-w-1/2 mx-auto pt-10">
              <img src="Tailwindicon.svg" alt="Tailwind Icon" />
            </figure>
            <div class="card-body items-center">
              <h2 class="card-title text-center">Tailwind</h2>
            </div>
          </div>
          <div class="card bg-base shadow-sm rounded-full">
            <figure class="max-w-1/2 mx-auto pt-10">
              <img src="Giticon.png" alt="Git Icon" />
            </figure>
            <div class="card-body items-center">
              <h2 class="card-title text-center">Git</h2>
            </div>
          </div>
        </div>
        <div class="divider divider-info"></div>
      </section>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
