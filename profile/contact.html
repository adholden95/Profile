<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./src/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <title>Alex Holden - Welcome To My Profile!</title>
  </head>
  <body class="bg-neutral-200 min-h-screen font1 overflow-x-hidden">
    <section class="min-h-screen w-full flex flex-col md:flex-row gap-8 px-4 py-10">
      <!--Left hand card-->
      <div class="w-full max-w-md md:w-1/3 mx-auto">
        <div class="md:sticky md:top-10 bg-blue-500 rounded-xl shadow-lg flex flex-col items-center p-8">
          <div class="avatar avatar-placeholder">
            <div class="bg-neutral text-neutral-content w-24 rounded-full">
              <span class="text-3xl">A</span>
            </div>
          </div>
          <div class="divider w-full"></div>
          <p class="text-white text-xl text-center">alex holden</p>
          <span class="text-rotate text-xl leading-[2]">
            <span class="justify-items-center text-white">
              <span><i class="bi bi-github"></i> adholden95</span>
              <span><i class="bi bi-envelope"></i> adholden@live.co.uk</span>
              <span><i class="bi bi-telephone"></i> 07777777777</span>
            </span>
          </span>
          <div class="flex gap-6 mt-4">
            <a href="https://github.com/adholden95">
              <i class="bi bi-github text-white text-4xl hover:text-sky-950 transition"></i>
            </a>
            <a href="https://www.linkedin.com/in/alex-holden-400280279">
              <i class="bi bi-linkedin text-white text-4xl hover:text-sky-950 transition"></i>
            </a>
          </div>
          <div class="flex items-center gap-4 mt-6">
            <a href="https://drive.google.com/uc?id=14RvsMJg7Fnfd5VHrpCvj7Tq4pJxDfOmb&export=download" class="text-white hover:underline text-center">Download CV</a>
            <div class="divider divider-horizontal"></div>
            <a href="/contact.html" class="text-white hover:underline text-center">Contact Me</a>
          </div>
        </div>
      </div>
      <!--Right Hand Card-->
      <div class="w-full max-w-2xl md:w-2/3 bg-white rounded-xl shadow-lg p-8 mx-auto">
        <div class="chat chat-start">
            <div class="chat-bubble chat-bubble-info text-2xl">Get In Touch!</div>
        </div>
        <div class="divider divider-info"></div>
        <form method="POST" action="" name="contact" id="conForm" >
            <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-4 sm:grid-cols-6">
                <div class="sm:col-span-3 mb-6">
                    <label for="name" class="block text-sm/6 font-medium text-gray-900">Name</label>
                    <div class="mt-2">
                        <input id="name" type="text" name="name" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6" required placeholder="Name" />
                    </div>
                </div>
                <br>
                <div class="sm:col-span-3">
                    <label for="conNumber" class="block text-sm/6 font-medium text-gray-900">Contact Number</label>
                    <div class="mt-2">
                        <input id="conNumber" type="tel" name="conNumber" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6 input validator tabular-nums" required placeholder="Phone Number" pattern="[0-9]*" minlength="11" maxlength="11" title="Please enter a valid phone number"/>
                        <p class="validator-hint">Please enter a valid UK phone number</p>
                    </div>
                </div>
                <div class="sm:col-span-4">
                    <label for="email" class="block text-sm/6 font-medium text-gray-900">Email address</label>
                    <div class="mt-2">
                        <input id="email" type="email" name="email" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6 input validator" required placeholder="Email Address" />
                        <div class="validator-hint">Enter valid email address</div>
                    </div>
                </div>
                <div class="col-span-full">
                    <label for="about" class="block text-sm/6 font-medium text-gray-900">Your Message</label>
                    <div class="mt-2">
                        <textarea id="about" name="about" rows="3" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6"></textarea>
                    </div>
                </div>
            </div>
            <div class="mt-6 flex items-center justify-end gap-x-6">
                <button type="button" class="rounded-md bg-neutral-800 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Cancel</button>
                <button type="submit" class="rounded-md bg-blue-500 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Send</button>
            </div>
        </form>
        
      </div>
      </section>
      <!--FAB Buttons-->
        <div class="fab">
          <div tabindex="0" role="button" class="btn btn-lg btn-circle btn-info text-xl">+</div>
          <a href="/index.html"><button class="btn btn-lg btn-circle"><i class="bi bi-house text-xl text-blue-500"></i></button></a>
          <a href="/contact.html"><button class="btn btn-lg btn-circle"><i class="bi bi-envelope text-xl text-blue-500"></i></button></a>
          <a href="https://github.com/adholden95"><button class="btn btn-lg btn-circle"><i class="bi bi-github text-xl text-blue-500"></i></button></a>
          <a href="https://www.linkedin.com/in/alex-holden-400280279"><button class="btn btn-lg btn-circle"><i class="bi bi-linkedin text-xl text-blue-500"></i></button></a>
        </div>
  </body>
</html>
